<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sakib Hasan - Personal Operating System Portfolio">
    <title>Sakib OS</title>
    
    <link rel="stylesheet" href="css/styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- BOOT SCREEN -->
    <div id="boot-screen" class="boot-screen">
        <div class="boot-logo">
            <div class="boot-icon">
                <i data-lucide="hexagon" width="64" height="64"></i>
            </div>
            <div class="boot-text">
                <span class="boot-brand">Sakib OS</span>
                <span class="boot-version">v1.0</span>
            </div>
        </div>
        <div class="boot-loader">
            <div class="loader-bar"></div>
        </div>
        <div class="boot-messages"></div>
    </div>

    <!-- MAIN OS SHELL -->
    <div id="os-shell" class="os-shell hidden">
        
        <!-- Background Layer -->
        <div id="background-layer" class="background-layer">
            <div class="wallpaper"></div>
            <canvas id="particle-canvas" class="particle-canvas"></canvas>
            <div class="noise-overlay"></div>
            <div class="scanlines"></div>
            <div class="vignette"></div>
        </div>

        <!-- Desktop Layer -->
        <div id="desktop-layer" class="desktop-layer">
            <div class="desktop-icons">
                <div class="desktop-icon" data-app="about" data-command="about" title="About Me">
                    <div class="icon-graphic"><i data-lucide="user-circle" width="32" height="32"></i></div>
                    <span class="icon-label">About Me</span>
                </div>
                <div class="desktop-icon" data-app="resume" data-command="resume" title="Resume">
                    <div class="icon-graphic"><i data-lucide="file-text" width="32" height="32"></i></div>
                    <span class="icon-label">Resume</span>
                </div>
                <!-- GitHub - using code-2 icon -->
                <div class="desktop-icon" data-app="github" data-command="github" title="GitHub">
                    <div class="icon-graphic"><i data-lucide="code-2" width="32" height="32"></i></div>
                    <span class="icon-label">GitHub</span>
                </div>
                <!-- LinkedIn - using briefcase icon -->
                <div class="desktop-icon" data-app="linkedin" data-command="linkedin" title="LinkedIn">
                    <div class="icon-graphic"><i data-lucide="briefcase" width="32" height="32"></i></div>
                    <span class="icon-label">LinkedIn</span>
                </div>
                <!-- YouTube - using play-circle icon -->
                <div class="desktop-icon" data-app="youtube" data-command="youtube" title="YouTube">
                    <div class="icon-graphic"><i data-lucide="play-circle" width="32" height="32"></i></div>
                    <span class="icon-label">YouTube</span>
                </div>
                <div class="desktop-icon" data-app="contact" data-command="contact" title="Contact">
                    <div class="icon-graphic"><i data-lucide="mail" width="32" height="32"></i></div>
                    <span class="icon-label">Contact</span>
                </div>
                <div class="desktop-icon" data-app="game" data-command="game" title="Game Hub">
                    <div class="icon-graphic"><i data-lucide="gamepad-2" width="32" height="32"></i></div>
                    <span class="icon-label">Game Hub</span>
                </div>
                <div class="desktop-icon" data-app="vault" data-command="vault" title="Sakib's Vault">
                    <div class="icon-graphic"><i data-lucide="vault" width="32" height="32"></i></div>
                    <span class="icon-label">Vault</span>
                </div>
            </div>
        </div>

        <!-- Window Container -->
        <div id="window-container" class="window-container"></div>

        <!-- Taskbar -->
        <div id="taskbar" class="taskbar">
            <div class="taskbar-left">
                <button id="start-button" class="taskbar-button start-button" title="Start Menu">
                    <i data-lucide="hexagon" width="22" height="22"></i>
                </button>
                <div class="taskbar-divider"></div>
                <div id="running-apps" class="running-apps"></div>
            </div>
            <div class="taskbar-center">
                <div class="command-bar-wrapper">
                    <span class="command-prompt-icon">
                        <i data-lucide="chevron-right" width="14" height="14"></i>
                    </span>
                    <input type="text" id="command-input-real" class="command-input-real" 
                           placeholder="Type a command..." autocomplete="off" spellcheck="false">
                </div>
            </div>
            <div class="taskbar-right">
                <div class="system-indicators">
                    <button class="indicator sound-indicator" id="sound-toggle" title="Toggle Sound">
                        <i data-lucide="volume-2" width="18" height="18"></i>
                    </button>
                    <div class="indicator time-indicator" id="system-clock">00:00</div>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="start-menu hidden">
            <div class="start-menu-header">
                <div class="user-avatar">SH</div>
                <div class="user-info">
                    <div class="user-name">Sakib Hasan</div>
                    <div class="user-title">sakib.hsn44@gmail.com</div>
                </div>
            </div>
            <div class="start-menu-apps">
                <div class="start-menu-item" data-app="about">
                    <span class="menu-icon"><i data-lucide="user-circle" width="18" height="18"></i></span>
                    <span>About Me</span>
                </div>
                <div class="start-menu-item" data-app="resume">
                    <span class="menu-icon"><i data-lucide="file-text" width="18" height="18"></i></span>
                    <span>Resume</span>
                </div>
                <div class="start-menu-item" data-app="github">
                    <span class="menu-icon"><i data-lucide="code-2" width="18" height="18"></i></span>
                    <span>GitHub</span>
                </div>
                <div class="start-menu-item" data-app="linkedin">
                    <span class="menu-icon"><i data-lucide="briefcase" width="18" height="18"></i></span>
                    <span>LinkedIn</span>
                </div>
                <div class="start-menu-item" data-app="youtube">
                    <span class="menu-icon"><i data-lucide="play-circle" width="18" height="18"></i></span>
                    <span>YouTube</span>
                </div>
                <div class="start-menu-item" data-app="contact">
                    <span class="menu-icon"><i data-lucide="mail" width="18" height="18"></i></span>
                    <span>Contact</span>
                </div>
                <div class="start-menu-item" data-app="game">
                    <span class="menu-icon"><i data-lucide="gamepad-2" width="18" height="18"></i></span>
                    <span>Game Hub</span>
                </div>
                <div class="start-menu-item" data-app="vault">
                    <span class="menu-icon"><i data-lucide="vault" width="18" height="18"></i></span>
                    <span>Sakib's Vault</span>
                </div>
            </div>
            <div class="start-menu-footer">
                <div class="start-menu-item system-action" data-action="restart">
                    <span class="menu-icon"><i data-lucide="rotate-cw" width="18" height="18"></i></span>
                    <span>Restart System</span>
                </div>
                <div class="start-menu-item system-action" data-action="shutdown">
                    <span class="menu-icon"><i data-lucide="power" width="18" height="18"></i></span>
                    <span>Shutdown</span>
                </div>
            </div>
        </div>

        <!-- Shutdown Screen -->
        <div id="shutdown-screen" class="system-screen hidden">
            <div class="system-message">
                <div class="disconnect-icon">
                    <i data-lucide="hexagon" width="80" height="80"></i>
                </div>
                <div class="disconnect-text">SYSTEM DISCONNECTED</div>
                <div class="disconnect-sub">Click anywhere to restart</div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- SCRIPTS -->
    <script src="js/icons.js"></script>
    <script src="js/system-state.js"></script>
    <script src="js/sound-engine.js"></script>
    <script src="js/theme-engine.js"></script>
    <script src="js/window-manager.js"></script>
    <script src="js/command-system.js"></script>
    <script src="js/os-core.js"></script>
    <script src="js/apps/about.js"></script>
    <script src="js/apps/resume.js"></script>
    <script src="js/apps/github.js"></script>
    <script src="js/apps/linkedin.js"></script>
    <script src="js/apps/youtube.js"></script>
    <script src="js/apps/contact.js"></script>
    <script src="js/apps/game.js"></script>
    <script src="js/apps/vault.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
